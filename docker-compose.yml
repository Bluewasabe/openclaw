services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_HOST: ${OLLAMA_HOST}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GIT_AUTHOR_NAME: ${GIT_USER_NAME}
      GIT_AUTHOR_EMAIL: ${GIT_USER_EMAIL}
      GIT_COMMITTER_NAME: ${GIT_USER_NAME}
      GIT_COMMITTER_EMAIL: ${GIT_USER_EMAIL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${OPENCLAW_CONFIG_DIR}/.gitconfig:/home/node/.gitconfig:ro
      - ${OBSIDIAN_VAULT_DIR}:/home/node/.openclaw/workspace/vault
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    networks:
      - jarvis-net
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      BROWSER: echo
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY}
      OLLAMA_HOST: ${OLLAMA_HOST}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GIT_AUTHOR_NAME: ${GIT_USER_NAME}
      GIT_AUTHOR_EMAIL: ${GIT_USER_EMAIL}
      GIT_COMMITTER_NAME: ${GIT_USER_NAME}
      GIT_COMMITTER_EMAIL: ${GIT_USER_EMAIL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      - ${OPENCLAW_CONFIG_DIR}/.gitconfig:/home/node/.gitconfig:ro
    stdin_open: true
    tty: true
    init: true
    networks:
      - jarvis-net
    entrypoint: ["node", "dist/index.js"]

  silverbullet:
    image: silverbulletmd/silverbullet:latest
    container_name: silverbullet
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ${OBSIDIAN_VAULT_DIR}:/space
    environment:
      - SB_USER=admin:${SB_PASSWORD:-changeme}
    networks:
      - jarvis-net

networks:
  jarvis-net:
    external: true
